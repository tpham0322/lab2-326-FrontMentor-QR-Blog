<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Frontend Mentor | Blog Preview Card</title>

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<main aria-label="Blog preview">

    <article
        class="card"
        aria-labelledby="blog-title"
        aria-describedby="blog-description">

        <img
            class="hero"
            src="./assets/images/illustration-article.svg"
            alt="Illustration representing an article.">

        <span class="tag">Learning</span>

        <p class="date">
            Published <time datetime="2023-12-21">21 Dec 2023</time>
        </p>

        <h1 id="blog-title">
            <a href="#">
                HTML &amp; CSS foundations
            </a>
        </h1>

        <p id="blog-description">
            These languages are the backbone of every website,
            defining structure, content, and presentation.
        </p>

        <div class="author">

            <img
                src="./assets/images/image-avatar.webp"
                alt="Portrait of Greg Hooper">

            <p>Greg Hooper</p>

        </div>

    </article>

</main>

<footer class="attribution">
    Challenge by
    <a href="https://www.frontendmentor.io?ref=challenge">
        Frontend Mentor
    </a>.
    Coded by
    <a href="#">Your Name</a>.
</footer>

</body>
</html>
