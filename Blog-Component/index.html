<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Frontend Mentor | Blog Preview Card</title>

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex flex-column justify-content-center align-items-center min-vh-100">

    <main class="container d-flex justify-content-center align-items-center flex-grow-1">

        <article class="card p-4 blog-card">

            <img
                src="./assets/images/illustration-article.svg"
                class="img-fluid rounded-3 mb-4"
                alt="Illustration representing an article">

            <div class="mb-3">
                <span class="badge bg-warning text-dark fw-bold px-3 py-2">
                    Learning
                </span>
            </div>

            <p class="small mb-3">
                Published
                <time datetime="2023-12-21">21 Dec 2023</time>
            </p>

            <h1 class="h3 fw-bold mb-3">
                <a href="#" class="text-decoration-none title">
                    HTML &amp; CSS foundations
                </a>
            </h1>

            <p class="text-secondary mb-4">
                These languages are the backbone of every website,
                defining structure, content, and presentation.
            </p>

            <div class="d-flex align-items-center gap-3">

                <img
                    src="./assets/images/image-avatar.webp"
                    alt="Greg Hooper"
                    width="32"
                    class="img-fluid">

                <p class="fw-bold mb-0">
                    Greg Hooper
                </p>

            </div>

        </article>

    </main>

    <footer class="text-center small my-3">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge">
            Frontend Mentor
        </a>.
        Coded by
        <a href="#">Your Name</a>.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
