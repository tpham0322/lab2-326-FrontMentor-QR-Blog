<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Frontend Mentor | QR Code Component</title>

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex flex-column justify-content-center align-items-center min-vh-100">

    <main class="container d-flex justify-content-center align-items-center flex-grow-1">

        <article
            class="card p-3 text-center w-100 qr-card"
            aria-labelledby="card-title"
            aria-describedby="card-description">

            <img
                src="./images/image-qr-code.png"
                class="img-fluid rounded-4"
                alt="QR code that links to the Frontend Mentor website">

            <h1
                id="card-title"
                class="h4 fw-bold mt-4 mb-3">
                Improve your front-end skills by building projects
            </h1>

            <p
                id="card-description"
                class="mb-4 px-2">
                Scan the QR code to visit Frontend Mentor and take your coding skills to the next level.
            </p>

        </article>

    </main>

    <footer class="text-center small mb-3">

        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge">
            Frontend Mentor
        </a>.
        Coded by
        <a href="#">Truong Pham</a>.

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
